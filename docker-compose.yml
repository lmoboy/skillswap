services:
   mysql:
      image: mysql:8.0
      container_name: skillswap-mysql
      environment:
         MYSQL_ROOT_PASSWORD: rootpassword
         MYSQL_DATABASE: skillswap
         MYSQL_USER: skillswap
         MYSQL_PASSWORD: skillswap
      volumes:
         - mysql-data:/var/lib/mysql
      networks:
         - skillswap-network
      restart: unless-stopped
      healthcheck:
         test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
         timeout: 20s
         retries: 10
      deploy:
         resources:
            limits:
               memory: 1G

   backend:
      build:
         context: ./backend
         dockerfile: Dockerfile
      container_name: skillswap-backend
      expose:
         - '8080'
      environment:
         - DB_URL=skillswap:skillswap@tcp(mysql:3306)/skillswap?parseTime=true
      volumes:
         - backend-uploads:/root/uploads
      depends_on:
         mysql:
            condition: service_healthy
      networks:
         skillswap-network:
            aliases:
               - backend
      restart: unless-stopped
      deploy:
         resources:
            limits:
               memory: 512M

   frontend:
      build:
         context: ./frontend
         dockerfile: Dockerfile
         shm_size: '1gb'
      container_name: skillswap-frontend
      expose:
         - '3000'
      environment:
         - ORIGIN=https://skillswap.online
         - BODY_SIZE_LIMIT=Infinity
         - BACKEND_URL=http://backend:8080
         - NODE_OPTIONS=--max-old-space-size=1024
         - PUBLIC_TURN_HOST=skillswap.online
         - PUBLIC_TURN_PORT=3478
         - PUBLIC_TURN_TLS_PORT=5349
         - PUBLIC_TURN_USERNAME=skillswap
         - PUBLIC_TURN_PASSWORD=skillswap-turn-password
      depends_on:
         - backend
      networks:
         - skillswap-network
      restart: unless-stopped
      deploy:
         resources:
            limits:
               memory: 2G
            reservations:
               memory: 512M

   coturn:
      image: instrumentisto/coturn:latest
      container_name: skillswap-coturn
      command:
         - -c
         - /etc/coturn/turnserver.conf
      ports:
         - '3478:3478/tcp'
         - '3478:3478/udp'
         - '5349:5349/tcp'
         - '5349:5349/udp'
         - '49160-49200:49160-49200/udp'
      volumes:
         - ./infra/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
         - ./letsencrypt:/etc/letsencrypt:ro
      networks:
         - skillswap-network
      restart: unless-stopped

   nginx:
      image: nginx:latest
      container_name: skillswap-nginx
      ports:
         - '80:80'
         - '443:443'
      volumes:
         - ./nginx.conf:/etc/nginx/nginx.conf:ro
         - ./letsencrypt:/etc/letsencrypt:ro
         - webroot:/var/www/certbot
      depends_on:
         - frontend
         - backend
      networks:
         - skillswap-network
      restart: unless-stopped

   certbot:
      image: certbot/certbot
      container_name: skillswap-certbot
      volumes:
         - ./letsencrypt:/etc/letsencrypt
         - webroot:/var/www/certbot
      entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12d & wait $!; done;'"
      networks:
         - skillswap-network

networks:
   skillswap-network:
      driver: bridge

volumes:
   mysql-data:
   backend-uploads:
   webroot:
